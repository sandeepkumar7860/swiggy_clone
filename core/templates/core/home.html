
{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<style>
/* Restaurant Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;              /* Space between restaurants */
    margin-top: 25px;
    padding: 10px 0;
}

/* Restaurant Card */
.grid {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    transition: 0.3s ease;
    text-align: center;
}

/* Hover Effect */
.card:hover {
    transform: translateY(-7px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.20);
}

/* Restaurant Image */
 img {
    width: 100%;
    height: 170px;
    object-fit: cover;     /* Perfect crop */
    border-radius: 10px;
}

/* Button */
.menu-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 7px 15px;
    background: #ff7b00;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}

.menu-btn:hover {
    background: #ff5500;
}
</style>
  <h2>Restaurants</h2>
  <div class="grid">
    {% for r in restaurants %}
      <div class="card">
        {% if r.image %}<img src="{{ r.image.url }}" alt="{{ r.name }}"style="width:150px; height:150px; object-fit:cover; border-radius:10px;">{% endif %}
        <h3><a href="{% url 'core:restaurant_detail' r.pk %}" style="color: rgb(10, 0, 0);">{{ r.name }}</a></h3>
        <p>{{ r.address }}</p>
      </div>
    {% empty %}
      <p>No restaurants yet.</p>
    {% endfor %}
  </div>
{% endblock %}
