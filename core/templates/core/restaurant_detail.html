{% extends 'core/base.html' %}
{% load static %}

{% block content %}

<style>
.menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}
.menu-card {
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    transition: .2s ease;
}
.menu-card:hover {
    transform: scale(1.02);
}
.menu-image {
    width: 100%;
    height: 160px;
    border-radius: 16px;
    object-fit: cover;
}
.add-btn {
    margin-top: 5px;
    padding: 6px 12px;
    border: 1px solid #60b246;
    color: #60b246;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
}
.add-btn:hover {
    background: #60b246;
    color: #fff;
}
</style>

<h2>{{ restaurant.name }}</h2>
<p>{{ restaurant.description }}</p>

<h3>Recommended</h3>

<div class="menu-grid">

    {% for item in items %}
        <div class="menu-card">

            {% if item.image %}
                <img src="{{ item.image.url }}" class="menu-image">
            {% else %}
                <img src="{% static 'core/no-image.jpg' %}" class="menu-image">
            {% endif %}

            <p class="menu-title">{{ item.name }}</p>
            <p class="menu-price">₹{{ item.price }}</p>

            <form action="{% url 'core:add_to_cart' item.id %}" method="post">
                {% csrf_token %}
                <button type="submit" class="add-btn">ADD</button>
            </form>

        </div>
    {% endfor %}

</div>

{% endblock %}
